[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/book-call"
  to = "http://calendly.com/sannex/book-free-consultation"
  status = 301

[[redirects]]
  from = "/book-call/"
  to = "http://calendly.com/sannex/book-free-consultation"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 5173
  publish = "dist"
  functions = "netlify/functions"
